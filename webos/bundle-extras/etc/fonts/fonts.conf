<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- webOS TouchPad system fonts -->
  <dir>/usr/share/fonts</dir>
  <dir>/usr/share/fonts/truetype</dir>
  <!-- Also check our bundle directory (for bundled fonts, if any) -->
  <dir prefix="default">fonts</dir>
  <cachedir>/tmp/fontconfig-prism</cachedir>
</fontconfig>
